<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações Pessoais</title>
</head>
<body>
    <h1>Informações Pessoais</h1>
    <fieldset>
        <legend>Cadastro de Cliente</legend>
        <p>Nome: <input type="name" placeholder="Digite o nome do cliente"></p>
        <p>Idade: <input type="number" placeholder="Digite a Idade" maxlength="2" size="2" ></p>
        <p>Endereço: <input type="text" placeholder="Digite a cidade"></p>
        <p>Cidade: <input type="text" placeholder="Digite a cidade"></p>
        <p>Estado:<input type="number" placeholder="UF" maxlength="2" size="2"></p>
        <P>Cep:<input type="number" placeholder="XXXX-XXX" maxlength="7" size="7"></P>
        <p>Tel/Rex: <input type="number" placeholder="99 9999 999" maxlength="9" size="9"></p>
        <p>Tel/Cel: <input type="number" placeholder="99 9999 999" maxlength="9" size="9"></p>
        <p>Email: <input type="email" placeholder="Digite aqui seu E-mail" maxlength="17" size="17"></p>
    </fieldset>
           <button>Enviar</button>
</body>
</html>
